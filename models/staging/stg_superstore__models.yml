version: 2

models:
  - name: stg_superstore__orders
    description: "Staging model for Superstore orders. Cleans up raw data and casts data types."
    columns:
      - name: order_item_id
        description: "The primary key for this table. A hashed combination of order_id and product_id."
        tests:
          - unique
          - not_null
      
      - name: order_id
        description: "The ID of the order."
        tests:
          - not_null
          
      - name: product_id
        description: "The ID of the product."
        tests:
          - not_null